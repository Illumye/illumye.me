        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.09);
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);

            height: 20px;

        }

            left: 0;

            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        @media (min-width: 600px) {
            .modal-overlay {
                align-items: center;
            }
            .modal-content {
                border-radius: 24px;
                padding: 30px;
                transform: scale(0.95);
                opacity: 0;
            }
            .modal-overlay.active .modal-content {
                transform: scale(1);
                opacity: 1;
            }

            display: flex;
            justify-content: center;
            align-items: center;

        }

        .modal-header h2 {
            color: #000000;
            font-size: 16px;
            font-weight: 700;
        }

            right: 0;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
        }

            height: 24px;
            fill: #666666;

        }

        .close-btn:hover svg {
            fill: #000000;
        }

            font-weight: 700;

            align-items: center;
            text-decoration: none;

    <script>
        const modal = document.getElementById('shareModal');

        function openModal() {
            modal.classList.add('active');
        }

        function closeModal(event, force = false) {
            if (force || event.target === modal) {
                modal.classList.remove('active');
            }
        }

        function copyLink(event) {
            event.preventDefault();
            navigator.clipboard.writeText("https://illumye.me").then(function() {
                const iconContainer = document.getElementById('copyIconContainer');
                const textSpan = document.getElementById('copyText');
                
                const originalSvg = '<svg id="copySvg" viewBox="0 0 24 24"><path d="M19 8H9a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2z"></path><path d="M5 16H4V5a2 2 0 0 1 2-2h11v1h-11a1 1 0 0 0-1 1v11z"></path></svg>';
                const tickSvg = '<svg viewBox="0 0 24 24" fill="#25d366"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"></path></svg>';
                
                iconContainer.innerHTML = tickSvg;
                textSpan.innerText = "Copied!";
                textSpan.style.color = "#25d366";

                setTimeout(function() {
                    iconContainer.innerHTML = originalSvg;
                    textSpan.innerText = "Copy Link";
                    textSpan.style.color = "#666666";
                }, 2000);

            }, function(err) {
                console.error('Erreur lors de la copie : ', err);
            });
        }
    </script>
