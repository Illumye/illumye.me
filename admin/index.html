<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administration - illumye.me</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <script>
    CMS.registerPreviewStyle("https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap");
    CMS.registerPreviewStyle("/style.css");

    var ContenuPreview = createClass({
      render: function() {
        var entry = this.props.entry;
        var profil = entry.getIn(['data', 'profil']);
        var liens = entry.getIn(['data', 'liens']);

        var nom = profil ? profil.get('nom') : '';
        var sousTitre = profil ? profil.get('sous_titre') : '';
        
        var avatarField = profil ? profil.get('avatar') : null;
        var avatarUrl = avatarField ? this.props.getAsset(avatarField).toString() : '';

        var liensBoutons = [];
        if (liens) {
          liensBoutons = liens.map(function(lien, index) {
            return h('div', { className: 'link-btn', key: index },
              h('span', {}, lien.get('titre') || 'Bouton')
            );
          });
        }

        return h('div', { id: 'container', style: { margin: '40px auto', position: 'relative' } },
          h('div', { className: 'profile' },
            avatarUrl ? h('img', { className: 'avatar', src: avatarUrl }) : null,
            h('h1', {}, nom),
            h('p', { className: 'profile-sub' }, sousTitre)
          ),
          h('div', { className: 'links' }, liensBoutons)
        );
      }
    });

    CMS.registerPreviewTemplate("contenu", ContenuPreview);
  </script>
</body>
</html>
